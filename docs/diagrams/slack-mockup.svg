<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 580" role="img" aria-label="Slack mockup: engineer mentions @oncall-assistant with a free-form question; bot replies in-thread with a bulleted past-incident summary.">
  <defs>
    <style><![CDATA[
      .ch     { font: 700 14px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #0f172a; }
      .nm     { font: 700 13px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #0f172a; }
      .nmbot  { font: 700 13px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #2563eb; }
      .ts     { font: 500 11px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #94a3b8; }
      .body   { font: 500 13px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #0f172a; }
      .bodymu { font: 500 12px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #475569; }
      .men    { font: 600 13px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #2563eb; }
      .pill   { font: 600 11px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #2563eb; }
      .av     { font: 700 12px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #ffffff; }
      .hdr    { font: 700 11px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; letter-spacing: 0.1em; fill: #64748b; }
    ]]></style>
  </defs>

  <!-- card frame -->
  <rect x="0.5" y="0.5" width="479" height="579" rx="14" fill="#ffffff" stroke="#e2e8f0"/>

  <!-- top channel bar -->
  <rect x="0.5" y="0.5" width="479" height="44" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="20" y="29" class="ch">#</text>
  <text x="34" y="29" class="ch">warchan</text>
  <text x="120" y="29" class="ts">· today 14:32</text>

  <!-- ── Engineer's @mention (top-level message) ───────────────── -->
  <circle cx="32" cy="86" r="14" fill="#0ea5e9"/>
  <text x="32" y="90" class="av" text-anchor="middle">SK</text>
  <text x="56" y="80" class="nm">Sara Kim</text>
  <text x="116" y="80" class="ts">14:32</text>
  <text x="56" y="106" class="body"><tspan class="men">@oncall-assistant</tspan> what's happening</text>
  <text x="56" y="124" class="body">with apt-service?</text>

  <!-- thread indent rule -->
  <line x1="32" y1="142" x2="32" y2="546" stroke="#cbd5e1" stroke-width="2"/>
  <text x="56" y="158" class="hdr">↳ THREAD · 1 reply</text>

  <!-- ── Bot reply (in thread) ─────────────────────────────────── -->
  <circle cx="56" cy="194" r="14" fill="#2563eb"/>
  <text x="56" y="198" class="av" text-anchor="middle">🤖</text>
  <text x="80" y="190" class="nmbot">On-Call Assistant</text>
  <text x="200" y="190" class="ts">APP · 14:32</text>

  <rect x="80" y="202" width="384" height="328" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="92" y="226" class="body" font-weight="700">🔍 Based on past incidents:</text>

  <text x="92" y="252" class="body">•  apt-service p99 spiked after a build push</text>
  <text x="104" y="268" class="bodymu">without warm cache. Drain queue and retry.</text>

  <text x="92" y="294" class="body">•  DB connection pool exhausted at peak.</text>
  <text x="104" y="310" class="bodymu">Bump <tspan font-weight="700">maxConnections</tspan> or recycle pods.</text>

  <text x="92" y="336" class="body">•  Memory leak in 1.4.2-rc — fixed in 1.4.1.</text>
  <text x="104" y="352" class="bodymu">Rollback resolved the prior 3 incidents.</text>

  <text x="92" y="378" class="body">•  Upstream auth-svc rate-limited the caller.</text>
  <text x="104" y="394" class="bodymu">Check 429s in logs · verify token rotation.</text>

  <text x="92" y="420" class="body">•  Pod scheduling stalled on node taint.</text>
  <text x="104" y="436" class="bodymu">Cordon offending node and reschedule.</text>

  <text x="92" y="478" class="pill">📁 5 past incident(s) referenced</text>
  <text x="92" y="500" class="bodymu">_Use /kb-search for more details_</text>

  <!-- input bar mock -->
  <rect x="16" y="552" width="448" height="20" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="28" y="566" class="ts">Reply…</text>
</svg>
