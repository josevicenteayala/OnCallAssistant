<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-label="Flow A — Ingestion: Slack message merged into per-thread document, written to S3, indexed by Bedrock KB via Titan into S3 Vectors.">
  <defs>
    <style><![CDATA[
      .actor   { font: 700 13px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #ffffff; }
      .lbl     { font: 600 13px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #0f172a; }
      .msg     { font: 500 12.5px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #0f172a; }
      .self    { font: 500 12.5px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #334155; }
      .num     { font: 700 12px -apple-system, "Segoe UI", Inter, Roboto, sans-serif; fill: #2563eb; }
      .lifeline{ stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 4 4; }
    ]]></style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/></marker>
  </defs>

  <rect width="1200" height="540" fill="#ffffff"/>

  <!-- Actor headers -->
  <rect x="20"   y="30" width="160" height="44" rx="8" fill="#4A154B"/>
  <text x="100"  y="58" class="actor" text-anchor="middle">Slack</text>
  <line x1="100" y1="74" x2="100" y2="500" class="lifeline"/>

  <rect x="220"  y="30" width="180" height="44" rx="8" fill="#FF9900"/>
  <text x="310"  y="58" class="actor" text-anchor="middle">Lambda · Ingest</text>
  <line x1="310" y1="74" x2="310" y2="500" class="lifeline"/>

  <rect x="440"  y="30" width="160" height="44" rx="8" fill="#6366f1"/>
  <text x="520"  y="58" class="actor" text-anchor="middle">Amazon S3</text>
  <line x1="520" y1="74" x2="520" y2="500" class="lifeline"/>

  <rect x="640"  y="30" width="160" height="44" rx="8" fill="#047857"/>
  <text x="720"  y="58" class="actor" text-anchor="middle">Bedrock KB</text>
  <line x1="720" y1="74" x2="720" y2="500" class="lifeline"/>

  <rect x="840"  y="30" width="160" height="44" rx="8" fill="#047857"/>
  <text x="920"  y="58" class="actor" text-anchor="middle">Titan V2</text>
  <line x1="920" y1="74" x2="920" y2="500" class="lifeline"/>

  <rect x="1040" y="30" width="160" height="44" rx="8" fill="#6366f1"/>
  <text x="1120" y="58" class="actor" text-anchor="middle">S3 Vectors</text>
  <line x1="1120" y1="74" x2="1120" y2="500" class="lifeline"/>

  <!-- Step 1: Slack → Lambda -->
  <text x="40"  y="118" class="num">①</text>
  <line x1="100" y1="130" x2="306" y2="130" stroke="#0f172a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="203" y="120" class="msg" text-anchor="middle">message.channels event</text>

  <!-- Step 2: Lambda self — merge thread (the only real work) -->
  <text x="240" y="180" class="num">②</text>
  <path d="M 310 192 L 380 192 L 380 218 L 314 218" fill="none" stroke="#0f172a" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="388" y="200" class="self">merge replies on thread → one document</text>
  <text x="388" y="216" class="self">key = thread_ts (idempotent)</text>

  <!-- Step 3: Lambda → S3 -->
  <text x="240" y="270" class="num">③</text>
  <line x1="310" y1="282" x2="516" y2="282" stroke="#0f172a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="413" y="272" class="msg" text-anchor="middle">PutObject · {thread_ts}.json</text>

  <!-- Step 4: Lambda → KB (sync trigger) -->
  <text x="240" y="322" class="num">④</text>
  <line x1="310" y1="334" x2="716" y2="334" stroke="#0f172a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="513" y="324" class="msg" text-anchor="middle">start_ingestion_job</text>

  <!-- Step 5: KB → S3 (read changed) -->
  <text x="660" y="372" class="num">⑤</text>
  <line x1="720" y1="384" x2="524" y2="384" stroke="#0f172a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="622" y="374" class="msg" text-anchor="middle">read changed objects · chunk</text>

  <!-- Step 6: KB → Titan V2 -->
  <text x="860" y="422" class="num">⑥</text>
  <line x1="720" y1="434" x2="916" y2="434" stroke="#0f172a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="818" y="424" class="msg" text-anchor="middle">embed chunks · 1024-dim</text>

  <!-- Step 7: Titan → S3 Vectors -->
  <text x="1060" y="472" class="num">⑦</text>
  <line x1="920" y1="484" x2="1116" y2="484" stroke="#0f172a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="1018" y="474" class="msg" text-anchor="middle">upsert · cosine index</text>

  <!-- Caption -->
  <text x="600" y="528" class="lbl" text-anchor="middle" fill="#475569">Same S3 key per thread → KB dedupes on sync · resolution replies re-ingest automatically</text>
</svg>
